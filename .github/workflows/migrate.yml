name: Migrate

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Which environment to run migrations against"
        required: true
        default: dev
        options:
          - dev
          - prod
      apply:
        type: boolean
        description: "Apply migrations? (false = dry run)"
        required: true
        default: false
  workflow_run:
    workflows: ["Terraform"]
    types: [completed]
    branches:
      - main
  pull_request:
    paths:
      - "prisma/migrations/**"
      - "prisma/schema.prisma"
      - ".github/workflows/migrate.yml"

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate migration history
        env:
          DATABASE_URL: "postgresql://unused:unused@localhost:5432/unused"
        run: |
          echo "Checking Prisma migration files are consistent with schema..."
          pnpm prisma validate
          pnpm prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url "${DATABASE_URL}" \
            --exit-code \
            || echo "::warning::Migration diff detected — make sure prisma migrate dev was run."

  resolve-matrix:
    if: >
      github.event_name != 'pull_request' &&
      (
        github.event_name != 'workflow_run' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push'
        )
      )
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.set.outputs.environments }}
      should_apply: ${{ steps.set.outputs.should_apply }}
    steps:
      - id: set
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENTS='["${{ github.event.inputs.environment }}"]'
            APPLY="${{ github.event.inputs.apply }}"
          else
            ENVIRONMENTS='["dev","prod"]'
            APPLY="true"
          fi
          echo "environments=${ENVIRONMENTS}" >> "$GITHUB_OUTPUT"
          echo "should_apply=${APPLY}" >> "$GITHUB_OUTPUT"

  migrate:
    needs: resolve-matrix
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.resolve-matrix.outputs.environments) }}
    runs-on: [self-hosted, "lumigraph-runner-${{ matrix.environment }}"]
    environment: ${{ matrix.environment }}
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      NODE_OPTIONS: --max-old-space-size=384

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --child-concurrency=2 --network-concurrency=8

      - name: Resolve DB connection info
        run: |
          DB_NAME="${DB_NAME:-lumigraph_db}"

          DB_JSON=$(aws rds describe-db-instances \
            --query "DBInstances[?DBName=='${DB_NAME}'] | [0]" \
            --output json)

          DB_HOST=$(echo "$DB_JSON" | jq -r '.Endpoint.Address')
          DB_PORT=$(echo "$DB_JSON" | jq -r '.Endpoint.Port')
          DB_USER=$(echo "$DB_JSON" | jq -r '.MasterUsername')
          SECRET_ARN=$(echo "$DB_JSON" | jq -r '.MasterUserSecret.SecretArn')

          DB_PASSWORD=$(aws secretsmanager get-secret-value \
            --secret-id "${SECRET_ARN}" \
            --query SecretString --output text | jq -r '.password')

          echo "::add-mask::${DB_PASSWORD}"

          DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require"
          echo "::add-mask::${DATABASE_URL}"
          echo "DATABASE_URL=${DATABASE_URL}" >> "$GITHUB_ENV"

      - name: Prisma migrate deploy
        if: >
          github.event_name == 'workflow_run' ||
          (github.event_name == 'workflow_dispatch' && needs.resolve-matrix.outputs.should_apply == 'true')
        run: pnpm prisma migrate deploy

      - name: Prisma migrate status (dry run)
        if: >
          github.event_name == 'workflow_dispatch' &&
          needs.resolve-matrix.outputs.should_apply != 'true'
        run: pnpm prisma migrate status
