# Run integration tests via docker-compose (postgres + integration runner).
# Invoked by Deploy workflow after build.
name: Integration

on:
  workflow_call:

jobs:
  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Postgres and run integration tests
        run: |
          docker compose up -d postgres
          docker compose run --rm integration

      - name: Teardown
        if: always()
        run: docker compose down
