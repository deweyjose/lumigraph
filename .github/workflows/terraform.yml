# Runs Terraform plan/apply for infrastructure/app (and bootstrap via manual dispatch).
# Migrate workflow triggers automatically after successful runs on main.
name: Terraform

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Which environment to run (GitHub Environment)"
        required: true
        default: dev
        options:
          - dev
          - prod
      apply:
        type: boolean
        description: "Apply after plan?"
        required: true
        default: false
      target:
        type: choice
        description: "Which Terraform stack to run"
        required: true
        default: app
        options:
          - app
          - bootstrap
  push:
    branches:
      - main
    paths:
      - "infrastructure/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "infrastructure/**"
      - ".github/workflows/terraform.yml"

jobs:
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.set.outputs.environments }}
      target: ${{ steps.set.outputs.target }}
      should_apply: ${{ steps.set.outputs.should_apply }}
    steps:
      - id: set
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo 'environments=["${{ github.event.inputs.environment }}"]' >> "$GITHUB_OUTPUT"
            echo "target=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
            echo "should_apply=${{ github.event.inputs.apply }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo 'environments=["dev","prod"]' >> "$GITHUB_OUTPUT"
            echo "target=app" >> "$GITHUB_OUTPUT"
            echo "should_apply=true" >> "$GITHUB_OUTPUT"
          else
            echo 'environments=["dev"]' >> "$GITHUB_OUTPUT"
            echo "target=app" >> "$GITHUB_OUTPUT"
            echo "should_apply=false" >> "$GITHUB_OUTPUT"
          fi

  terraform:
    needs: resolve-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.resolve-matrix.outputs.environments) }}
    environment: ${{ matrix.environment }}
    permissions:
      id-token: write
      contents: read
    env:
      TF_IN_AUTOMATION: "true"
      TF_TARGET: ${{ needs.resolve-matrix.outputs.target }}
      TF_VAR_env: ${{ matrix.environment }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
      TF_VAR_runner_security_group_id: ${{ secrets.TF_VAR_runner_security_group_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure Backend (app only)
        if: env.TF_TARGET == 'app'
        working-directory: infrastructure/app
        run: |
          if [ -n "${TF_STATE_BUCKET}" ] && [ -n "${TF_LOCK_TABLE}" ]; then
            STATE_BUCKET="${TF_STATE_BUCKET}"
            LOCK_TABLE="${TF_LOCK_TABLE}"
          else
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            STATE_BUCKET="lumigraph-tfstate-main-${ACCOUNT_ID}-${AWS_REGION}"
            LOCK_TABLE="lumigraph-tflock-main-${ACCOUNT_ID}-${AWS_REGION}"
          fi

          cat > backend.hcl <<EOF
          bucket         = "${STATE_BUCKET}"
          key            = "app/terraform.tfstate"
          region         = "${AWS_REGION}"
          dynamodb_table = "${LOCK_TABLE}"
          encrypt        = true
          EOF

      - name: Terraform Init (bootstrap)
        if: env.TF_TARGET == 'bootstrap'
        working-directory: infrastructure/bootstrap
        run: terraform init

      - name: Terraform Init (app)
        if: env.TF_TARGET == 'app'
        working-directory: infrastructure/app
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Fmt
        working-directory: infrastructure/${{ env.TF_TARGET }}
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: infrastructure/${{ env.TF_TARGET }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure/${{ env.TF_TARGET }}
        run: |
          if [ "${TF_TARGET}" = "app" ] && [ -n "${TF_VAR_runner_security_group_id}" ]; then
            terraform plan \
              -var="aws_region=${AWS_REGION}" \
              -var="runner_security_group_id=${TF_VAR_runner_security_group_id}"
          else
            terraform plan -var="aws_region=${AWS_REGION}"
          fi

      - name: Terraform Apply
        if: needs.resolve-matrix.outputs.should_apply == 'true'
        working-directory: infrastructure/${{ env.TF_TARGET }}
        run: |
          if [ "${TF_TARGET}" = "app" ] && [ -n "${TF_VAR_runner_security_group_id}" ]; then
            terraform apply -auto-approve \
              -var="aws_region=${AWS_REGION}" \
              -var="runner_security_group_id=${TF_VAR_runner_security_group_id}"
          else
            terraform apply -auto-approve -var="aws_region=${AWS_REGION}"
          fi
