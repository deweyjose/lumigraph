name: Terraform (reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      target:
        required: true
        type: string
        default: app
      apply:
        required: true
        type: boolean
    outputs:
      target:
        description: "Pass-through of the target input"
        value: ${{ jobs.terraform.outputs.target }}
      apply:
        description: "Pass-through of the apply input"
        value: ${{ jobs.terraform.outputs.apply }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    outputs:
      target: ${{ inputs.target }}
      apply: ${{ inputs.apply }}
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    env:
      TF_IN_AUTOMATION: "true"
      TF_TARGET: ${{ inputs.target }}
      TF_VAR_env: ${{ inputs.environment }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
      TF_VAR_runner_security_group_id: ${{ secrets.TF_VAR_runner_security_group_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure Backend (app only)
        if: env.TF_TARGET == 'app'
        working-directory: infrastructure/app
        run: |
          if [ -n "${TF_STATE_BUCKET}" ] && [ -n "${TF_LOCK_TABLE}" ]; then
            STATE_BUCKET="${TF_STATE_BUCKET}"
            LOCK_TABLE="${TF_LOCK_TABLE}"
          else
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            STATE_BUCKET="lumigraph-tfstate-main-${ACCOUNT_ID}-${AWS_REGION}"
            LOCK_TABLE="lumigraph-tflock-main-${ACCOUNT_ID}-${AWS_REGION}"
          fi

          cat > backend.hcl <<EOF
          bucket         = "${STATE_BUCKET}"
          key            = "app/terraform.tfstate"
          region         = "${AWS_REGION}"
          dynamodb_table = "${LOCK_TABLE}"
          encrypt        = true
          EOF

      - name: Terraform Init (bootstrap)
        if: env.TF_TARGET == 'bootstrap'
        working-directory: infrastructure/bootstrap
        run: terraform init

      - name: Terraform Init (app)
        if: env.TF_TARGET == 'app'
        working-directory: infrastructure/app
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Fmt
        working-directory: infrastructure/${{ env.TF_TARGET }}
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: infrastructure/${{ env.TF_TARGET }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure/${{ env.TF_TARGET }}
        run: |
          if [ "${TF_TARGET}" = "app" ] && [ -n "${TF_VAR_runner_security_group_id}" ]; then
            terraform plan \
              -var="aws_region=${AWS_REGION}" \
              -var="runner_security_group_id=${TF_VAR_runner_security_group_id}"
          else
            terraform plan -var="aws_region=${AWS_REGION}"
          fi

      - name: Terraform Apply
        if: inputs.apply
        working-directory: infrastructure/${{ env.TF_TARGET }}
        run: |
          if [ "${TF_TARGET}" = "app" ] && [ -n "${TF_VAR_runner_security_group_id}" ]; then
            terraform apply -auto-approve \
              -var="aws_region=${AWS_REGION}" \
              -var="runner_security_group_id=${TF_VAR_runner_security_group_id}"
          else
            terraform apply -auto-approve -var="aws_region=${AWS_REGION}"
          fi
