# Orchestrates Terraform and Migrate for each environment.
#
# Push to main:  plan + apply Terraform (dev, prod) → apply migrations (dev, prod)
# Pull request:  plan-only Terraform (dev) + validate migrations
# Manual:        pick environment, target, and apply flag
name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Which environment to deploy"
        required: true
        default: dev
        options:
          - dev
          - prod
      target:
        type: choice
        description: "Which Terraform stack to run"
        required: true
        default: app
        options:
          - app
          - bootstrap
      apply:
        type: boolean
        description: "Apply changes? (false = plan/dry-run only)"
        required: true
        default: false
  push:
    branches:
      - main
    paths:
      - "infrastructure/**"
      - "prisma/migrations/**"
      - "prisma/schema.prisma"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "infrastructure/**"
      - "prisma/migrations/**"
      - "prisma/schema.prisma"
      - ".github/workflows/**"

# ---------- resolve inputs for all downstream jobs ----------
jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.set.outputs.environments }}
      target: ${{ steps.set.outputs.target }}
      apply: ${{ steps.set.outputs.apply }}
    steps:
      - id: set
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo 'environments=["${{ github.event.inputs.environment }}"]' >> "$GITHUB_OUTPUT"
            echo "target=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
            echo "apply=${{ github.event.inputs.apply }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo 'environments=["dev","prod"]' >> "$GITHUB_OUTPUT"
            echo "target=app" >> "$GITHUB_OUTPUT"
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo 'environments=["dev"]' >> "$GITHUB_OUTPUT"
            echo "target=app" >> "$GITHUB_OUTPUT"
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------- Terraform (per environment) ----------
  terraform-dev:
    needs: resolve
    if: contains(fromJson(needs.resolve.outputs.environments), 'dev')
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/terraform.yml
    with:
      environment: dev
      target: ${{ needs.resolve.outputs.target }}
      apply: ${{ fromJson(needs.resolve.outputs.apply) }}
    secrets: inherit
    concurrency:
      group: deploy-terraform-dev
      cancel-in-progress: false

  terraform-prod:
    needs: resolve
    if: contains(fromJson(needs.resolve.outputs.environments), 'prod')
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/terraform.yml
    with:
      environment: prod
      target: ${{ needs.resolve.outputs.target }}
      apply: ${{ fromJson(needs.resolve.outputs.apply) }}
    secrets: inherit
    concurrency:
      group: deploy-terraform-prod
      cancel-in-progress: false

  # ---------- Migrate (per environment, after Terraform) ----------
  migrate-dev:
    needs: [resolve, terraform-dev]
    if: >
      contains(fromJson(needs.resolve.outputs.environments), 'dev') &&
      needs.resolve.outputs.target == 'app'
    uses: ./.github/workflows/migrate.yml
    with:
      environment: dev
      apply: ${{ fromJson(needs.resolve.outputs.apply) }}
    secrets: inherit
    concurrency:
      group: deploy-migrate-dev
      cancel-in-progress: false

  migrate-prod:
    needs: [resolve, terraform-prod]
    if: >
      contains(fromJson(needs.resolve.outputs.environments), 'prod') &&
      needs.resolve.outputs.target == 'app'
    uses: ./.github/workflows/migrate.yml
    with:
      environment: prod
      apply: ${{ fromJson(needs.resolve.outputs.apply) }}
    secrets: inherit
    concurrency:
      group: deploy-migrate-prod
      cancel-in-progress: false
