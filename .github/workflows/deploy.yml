# Orchestrates Build (lint, format, test), Terraform, and Migrate.
#
# Push/PR to main:  Build always; Terraform/Migrate only when their paths change
# Manual:           pick environment, target, and apply flag
name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Which environment to deploy"
        required: true
        default: dev
        options:
          - dev
          - prod
      target:
        type: choice
        description: "Which Terraform stack to run"
        required: true
        default: app
        options:
          - app
          - bootstrap
      apply:
        type: boolean
        description: "Apply changes? (false = plan/dry-run only)"
        required: true
        default: false
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# ---------- Build (lint, format, test) ----------
jobs:
  build:
    permissions:
      contents: read
    uses: ./.github/workflows/build.yml

  # ---------- Path filter: run Terraform/Migrate only when relevant paths change ----------
  filter:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_terraform: ${{ steps.outputs.outputs.run_terraform }}
      run_migrate: ${{ steps.outputs.outputs.run_migrate }}
    steps:
      - uses: actions/checkout@v4

      - id: dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "run_terraform=true" >> $GITHUB_OUTPUT
          echo "run_migrate=true" >> $GITHUB_OUTPUT

      - uses: dorny/paths-filter@v3
        if: github.event_name != 'workflow_dispatch'
        id: paths
        with:
          filters: |
            infra:
              - 'infrastructure/**'
              - '.github/workflows/**'
            prisma:
              - 'prisma/**'

      - id: outputs
        run: |
          echo "run_terraform=${{ steps.dispatch.outputs.run_terraform || steps.paths.outputs.infra }}" >> $GITHUB_OUTPUT
          echo "run_migrate=${{ steps.dispatch.outputs.run_migrate || steps.paths.outputs.prisma }}" >> $GITHUB_OUTPUT

  # ---------- Resolve inputs for Terraform/Migrate ----------
  resolve:
    needs: [build, filter]
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.set.outputs.environments }}
      target: ${{ steps.set.outputs.target }}
      apply: ${{ steps.set.outputs.apply }}
    steps:
      - id: set
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo 'environments=["${{ github.event.inputs.environment }}"]' >> "$GITHUB_OUTPUT"
            echo "target=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
            echo "apply=${{ github.event.inputs.apply }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo 'environments=["dev","prod"]' >> "$GITHUB_OUTPUT"
            echo "target=app" >> "$GITHUB_OUTPUT"
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo 'environments=["dev"]' >> "$GITHUB_OUTPUT"
            echo "target=app" >> "$GITHUB_OUTPUT"
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------- Terraform (per environment) ----------
  terraform-dev:
    needs: [resolve, filter]
    if: >
      needs.filter.outputs.run_terraform == 'true' &&
      contains(fromJson(needs.resolve.outputs.environments), 'dev')
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/terraform.yml
    with:
      environment: dev
      target: ${{ needs.resolve.outputs.target }}
      apply: ${{ fromJson(needs.resolve.outputs.apply) }}
    secrets: inherit
    concurrency:
      group: deploy-terraform-dev
      cancel-in-progress: false

  terraform-prod:
    needs: [resolve, filter]
    if: >
      needs.filter.outputs.run_terraform == 'true' &&
      contains(fromJson(needs.resolve.outputs.environments), 'prod')
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/terraform.yml
    with:
      environment: prod
      target: ${{ needs.resolve.outputs.target }}
      apply: ${{ fromJson(needs.resolve.outputs.apply) }}
    secrets: inherit
    concurrency:
      group: deploy-terraform-prod
      cancel-in-progress: false

  # ---------- Migrate (per environment, after Terraform) ----------
  migrate-dev:
    needs: [resolve, filter, terraform-dev]
    if: >
      needs.filter.outputs.run_migrate == 'true' &&
      contains(fromJson(needs.resolve.outputs.environments), 'dev') &&
      needs.resolve.outputs.target == 'app'
    uses: ./.github/workflows/migrate.yml
    with:
      environment: dev
      apply: ${{ fromJson(needs.resolve.outputs.apply) }}
    secrets: inherit
    concurrency:
      group: deploy-migrate-dev
      cancel-in-progress: false

  migrate-prod:
    needs: [resolve, filter, terraform-prod]
    if: >
      needs.filter.outputs.run_migrate == 'true' &&
      contains(fromJson(needs.resolve.outputs.environments), 'prod') &&
      needs.resolve.outputs.target == 'app'
    uses: ./.github/workflows/migrate.yml
    with:
      environment: prod
      apply: ${{ fromJson(needs.resolve.outputs.apply) }}
    secrets: inherit
    concurrency:
      group: deploy-migrate-prod
      cancel-in-progress: false
