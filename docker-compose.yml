services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lumigraph
      POSTGRES_PASSWORD: lumigraph
      POSTGRES_DB: lumigraph_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumigraph -d lumigraph_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  integration:
    build:
      context: .
      dockerfile: Dockerfile.integration
    environment:
      DATABASE_URL: postgresql://lumigraph:lumigraph@postgres:5432/lumigraph_db
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "pnpm install --frozen-lockfile && pnpm db:generate && pnpm db:deploy && pnpm test:integration"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
