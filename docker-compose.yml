services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lumigraph
      POSTGRES_PASSWORD: lumigraph
      POSTGRES_DB: lumigraph_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumigraph -d lumigraph_db"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
